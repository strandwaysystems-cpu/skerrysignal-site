<svg width="240" height="56" viewBox="0 0 240 56" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skerry Signal">
  <!-- Beacon mark: a signal pulse rising over a skerry (rock) -->
  <g>
    <!-- signal arcs -->
    <path d="M30 22 a14 14 0 0 1 0 -0.5" fill="none"/>
    <circle cx="28" cy="20" r="4.5" fill="#1f9aa3"/>
    <path d="M19.5 20 a8.5 8.5 0 0 1 17 0" fill="none" stroke="#1f9aa3" stroke-width="2.4" stroke-linecap="round" opacity="0.75"/>
    <path d="M14 20 a14 14 0 0 1 28 0" fill="none" stroke="#1f9aa3" stroke-width="2.4" stroke-linecap="round" opacity="0.4"/>
    <!-- skerry / rock waterline -->
    <path d="M10 38 q8 -10 18 -10 q10 0 18 10 z" fill="#0e2a3b"/>
    <!-- water lines -->
    <path d="M8 44 h40" stroke="#1f9aa3" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
    <path d="M13 49 h30" stroke="#1f9aa3" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  </g>
  <!-- Wordmark -->
  <text x="60" y="34" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif" font-size="25" font-weight="800" letter-spacing="-0.5" fill="#0e2a3b">Skerry<tspan fill="#1f9aa3">Signal</tspan></text>
</svg>
